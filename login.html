<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Supermercado El Ahorro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <div class="logo-container">
            <h1>Supermercado El Ahorro</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="registro.html">Registro</a></li>
            </ul>
        </nav>
    </header>

    <div class="login-wrapper">
        <div class="form-container">

           <div class="logo-login">
    <img src="images/logo.png" alt="Logo" class="logo-img">
</div>

            <h2>Iniciar Sesión</h2>
            <p class="subtitulo">Accede para ver tus ofertas exclusivas</p>

            <div id="mensaje-error-login"></div>

            <form id="form-login" novalidate>

                <div class="form-grupo">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email"
                        placeholder="ejemplo@correo.com"
                        autocomplete="email" required>
                </div>

                <div class="form-grupo">
                    <label for="password">Contraseña</label>
                    <div class="input-con-ojo">
                        <input type="password" id="password" name="password"
                            placeholder="Tu contraseña"
                            autocomplete="current-password" required>
                        <button type="button" class="btn-ojo" id="btn-ojo"
                            aria-label="Mostrar contraseña">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btn-submit-login">
                    Iniciar Sesión
                </button>

            </form>

            <div class="separador">o</div>

            <p class="link-registro">
                ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
            </p>

        </div>
    </div>

    <footer>
        <p>&copy; 2026 Supermercado El Ahorro</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const form       = document.getElementById('form-login');
            const emailInput = document.getElementById('email');
            const passInput  = document.getElementById('password');
            const btnSubmit  = document.getElementById('btn-submit-login');
            const btnOjo     = document.getElementById('btn-ojo');
            const mensajeErr = document.getElementById('mensaje-error-login');

            // ── Mostrar / ocultar contraseña ──
            btnOjo.addEventListener('click', () => {
                const esPassword   = passInput.type === 'password';
                passInput.type     = esPassword ? 'text' : 'password';
                btnOjo.textContent = esPassword ? '🙈' : '👁️';
            });

            // ── Validación en tiempo real ──
            emailInput.addEventListener('blur', () => validarEmail(emailInput));
            passInput.addEventListener('blur',  () => validarPassLogin(passInput));

            // ── Envío del formulario ──
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const emailOk = validarEmail(emailInput);
                const passOk  = validarPassLogin(passInput);
                if (!emailOk || !passOk) return;

                btnSubmit.disabled    = true;
                btnSubmit.textContent = 'Verificando...';
                ocultarError();

                try {
                    const datos = new FormData(form);
                    const resp  = await fetch('php/login.php', {
                        method: 'POST',
                        body: datos
                    });

                    const resultado = await resp.json();

                    if (resultado.exito) {
                        window.location.href = resultado.rol === 'administrador'
                            ? 'admin.php'
                            : 'ofertas.php';
                    } else {
                        mostrarError(resultado.mensaje || 'Credenciales incorrectas.');
                    }

                } catch (err) {
                    mostrarError('Error de conexión. Intenta de nuevo.');
                } finally {
                    btnSubmit.disabled    = false;
                    btnSubmit.textContent = 'Iniciar Sesión';
                }
            });

            // ── Validaciones ──
            function validarEmail(campo) {
                const valor = campo.value.trim();
                if (valor === '') {
                    marcarError(campo, 'El email es obligatorio.');
                    return false;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(valor)) {
                    marcarError(campo, 'Ingresa un email válido.');
                    return false;
                }
                limpiarCampo(campo);
                return true;
            }

            function validarPassLogin(campo) {
                if (campo.value === '') {
                    marcarError(campo, 'La contraseña es obligatoria.');
                    return false;
                }
                limpiarCampo(campo);
                return true;
            }

            function marcarError(campo, mensaje) {
                campo.classList.add('input-error');
                const grupo = campo.closest('.form-grupo');
                let span = grupo.querySelector('.error-msg');
                if (!span) {
                    span = document.createElement('span');
                    span.className = 'error-msg';
                    grupo.appendChild(span);
                }
                span.textContent = mensaje;
            }

            function limpiarCampo(campo) {
                campo.classList.remove('input-error');
                const span = campo.closest('.form-grupo').querySelector('.error-msg');
                if (span) span.remove();
            }

            function mostrarError(msg) {
                mensajeErr.textContent   = msg;
                mensajeErr.style.display = 'block';
            }

            function ocultarError() {
                mensajeErr.style.display = 'none';
            }
        });
    </script>

</body>
</html>
