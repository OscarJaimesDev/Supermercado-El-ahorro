<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas</title>

<script>
function calcularTotal(){
    let precio = document.getElementById("precio").value;
    let cantidad = document.getElementById("cantidad").value;

    let total = precio * cantidad;
    document.getElementById("total").value = total;
}

function confirmar(){
    return confirm("¿Registrar venta?");
}
</script>

</head>
<body>

<h2>Registrar Venta</h2>

<form action="php/guardar_venta.php" method="POST" onsubmit="return confirmar()">

Usuario ID:
<input type="number" name="id_usuario"><br><br>

Producto ID:
<input type="number" name="id_producto"><br><br>

Precio:
<input type="number" id="precio" name="precio" oninput="calcularTotal()"><br><br>

Cantidad:
<input type="number" id="cantidad" name="cantidad" oninput="calcularTotal()"><br><br>

Total:
<input type="text" id="total" readonly><br><br>

<button type="submit">Guardar Venta</button>

</form>

</body>
</html>
