</head>
<body>

    <header>
        <div class="logo-container">
            <h1>Supermercado El Ahorro</h1>
        </div>
        <nav>
            <ul>
                  <li><a href="index.html">Inicio</a></li>
        <li><a href="productos.html">Productos</a></li>
        <li id="link-registro"><a href="registro.html">Registro</a></li>
        <li id="link-ventas" style="display:none">
            <a href="ventas.php">Ventas</a>
        </li>
            </ul>
            <button id="btn-sesion">Iniciar sesión</button>
            <button id="btn-carrito">
                <img src="images/cart.png" alt="Carrito" width="24">
                <span id="carrito-contador" style="display:none">0</span>
            </button>
        </nav>
    </header>

    <div id="carrito-panel">
        <button id="btn-cerrar-carrito">✕ Cerrar</button>
        <h3>Tu carrito</h3>
        <div id="carrito-lista"></div>
        <p>Total: <span id="carrito-total">$0.00</span></p>
        <button id="btn-vaciar-carrito">Vaciar carrito</button>
        <a href="ventas.html"><button id="btn-ir-pagar">Ir a pagar</button></a>
    </div>

    <div id="notificacion"></div>

    <main>
        <div class="form-container">

            <h2>Crear Cuenta</h2>

            <form id="form-registro" action="php/registro.php" method="POST">

                <!-- Nombre -->
                <div class="form-grupo">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan">
                </div>

                <!-- Apellido -->
                <div class="form-grupo">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido" placeholder="Ej: Pérez">
                </div>

                <!-- Email -->
                <div class="form-grupo">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="Ej: juan@correo.com">
                </div>

                <!-- Teléfono (opcional) -->
                <div class="form-grupo">
                    <label for="telefono">Teléfono <span style="font-weight:normal; color:#888;">(opcional)</span></label>
                    <input type="tel" id="telefono" name="telefono" placeholder="Ej: 3001234567">
                </div>

                <!-- Contraseña -->
                <div class="form-grupo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres">
                    <!-- Indicador de fortaleza -->
                    <div class="fortaleza-container">
                        <div id="fortaleza-bar"></div>
                    </div>
                    <span id="fortaleza-texto"></span>
                </div>

                <!-- Confirmar contraseña -->
                <div class="form-grupo">
                    <label for="confirmar_password">Confirmar contraseña</label>
                    <input type="password" id="confirmar_password" name="confirmar_password" placeholder="Repite tu contraseña">
                </div>

                <!-- Mensaje de éxito (oculto por defecto, lo muestra validaciones.js) -->
                <div id="mensaje-exito" style="display:none"></div>

                <button type="submit" class="btn-agregar">Crear mi cuenta</button>

                <p style="text-align:center; margin-top:16px; font-size:0.9rem; color:#666;">
                    ¿Ya tienes cuenta? <a href="login.html" style="color:#2E7D32; font-weight:bold;">Inicia sesión</a>
                </p>

            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Supermercado El Ahorro</p>
    </footer>

    <script src="js/carrito.js"></script>
    <script src="js/validaciones.js"></script>
    <script src="js/scripts.js"></script>

</body>
</html>
