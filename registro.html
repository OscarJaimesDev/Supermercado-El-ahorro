<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - El Ahorro</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="contenedor-registro" style="max-width:450px; margin: 50px auto; background:white; padding:30px; border-radius:10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
        <h2 style="text-align:center; color:#2E7D32;">Crear Cuenta</h2>
        <form action="ofertas.html"> <div class="grupo-input" style="margin-bottom:15px;">
                <label style="display:block; font-weight:bold;">Nombre Completo:</label>
                <input type="text" style="width:100%; padding:10px;" required>
            </div>
            <div class="grupo-input" style="margin-bottom:15px;">
                <label style="display:block; font-weight:bold;">Correo Electrónico:</label>
                <input type="email" style="width:100%; padding:10px;" required>
            </div>
            <div class="grupo-input" style="margin-bottom:15px;">
                <label style="display:block; font-weight:bold;">Contraseña:</label>
                <input type="password" style="width:100%; padding:10px;" required>
            </div>
            <button type="submit" class="btn-agregar">Finalizar Registro</button>
        </form>
    </div>
</body>
</html>
